<!DOCTYPE html>
<html lang="en" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .header-container {
            text-align: center;
            margin-bottom: 40px;
            max-width: 400px;
            width: 100%;
        }

        /* GitHub-ൽ അപ്‌ലോഡ് ചെയ്യുന്ന atl.png ഇമേജ് */
        .apollo-logo {
            width: 100%;
            height: auto;
            max-width: 280px;
            margin-bottom: 20px;
        }

        h1 { 
            color: #5d2d91; 
            font-size: 28px; 
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button-group {
            width: 100%;
            max-width: 350px;
            display: flex; 
            flex-direction: column;
            gap: 15px;
        }

        .btn { 
            width: 100%; 
            padding: 22px; 
            font-size: 18px; 
            font-weight: 700; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-sizing: border-box;
        }
        
        /* WAX WEIGHT - Purple */
        .wax { 
            background: #5d2d91; 
            color: white; 
            box-shadow: 0 8px 15px rgba(93, 45, 145, 0.2);
        }
        
        .wax:hover {
            background: #4a2475;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(93, 45, 145, 0.3);
        }

        /* W/A DATA - Orange */
        .wa { 
            background: #f15a24; 
            color: white; 
            box-shadow: 0 8px 15px rgba(241, 90, 36, 0.2);
        }

        .wa:hover {
            background: #d44c1d;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(241, 90, 36, 0.3);
        }

        .btn:active { transform: scale(0.96); }

        .tagline {
            margin-top: 40px;
            font-size: 14px;
            color: #f15a24; 
            font-weight: 600;
            font-style: italic;
        }

        .footer {
            color: #94a3b8; 
            font-size: 12px; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="atl.png" alt="Apollo Logo" class="apollo-logo">
        <h1>Officers Entry</h1>
    </div>

    <div class="button-group">
        <a href="wax_entry.html" class="btn wax">WAX WEIGHT</a>
        <a href="wa_entry .html" class="btn wa">W/A DATA</a>
    </div>

    <div class="tagline">go the distance™</div>
    <div class="footer">Developed by Jefin</div>

</body>
</html>
