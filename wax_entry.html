<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage - Compound Wax</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* Apollo Brand Colors: Purple (#5d2d91), Orange (#f58220) */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #333; }
        
        .container { width: 92%; max-width: 500px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 6px 25px rgba(0,0,0,0.1); border-top: 5px solid #5d2d91; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { height: 40px; width: auto; }

        h3 { text-align: center; color: #5d2d91; margin-bottom: 25px; font-weight: 700; border-bottom: 2px solid #f58220; display: inline-block; width: 100%; padding-bottom: 10px; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 14px 15px 14px 45px; font-size: 16px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; text-transform: uppercase; font-weight: 600; transition: 0.3s; outline: none; }
        .input-box:focus { border-color: #5d2d91; box-shadow: 0 0 8px rgba(93, 45, 145, 0.15); }
        
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; }
        
        .btn { padding: 14px; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; transition: 0.3s; font-size: 16px; }
        .save-btn { background-color: #5d2d91; }
        .save-btn:hover { background-color: #4a2475; transform: translateY(-2px); }

        .table-container { margin-top: 25px; width: 100%; max-height: 400px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        
        thead { position: sticky; top: 0; background: #5d2d91; color: white; }
        th { padding: 12px; font-size: 13px; text-transform: uppercase; }

        td { border-bottom: 1px solid #f9f9f9; padding: 12px; font-size: 15px; font-weight: 600; color: #2c3e50; text-align: center; }
        
        .edit-input { width: 85%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold; color: #f58220; outline: none; }
        .edit-input:focus { border-color: #f58220; }

        .action-btns { display: flex; gap: 8px; justify-content: center; }
        .edit-btn { background: #f58220; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .edit-btn:hover { background: #e07210; }
        
        .del-btn { background: #fff; color: #e74c3c; border: 1px solid #ffcfcf; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { background: #ffebeb; }

        /* Custom Scrollbar */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="atl.png" alt="Apollo Logo">
        </div>
        <h3>Manage Wax Data</h3>
        
        <div class="input-group">
            <span class="input-icon">🔖</span>
            <input type="text" id="setCode" class="input-box" placeholder="Compound Code">
        </div>
        <div class="input-group">
            <span class="input-icon">⚖️</span>
            <input type="number" id="setWeight" class="input-box" placeholder="Weight (0.00)" step="0.01">
        </div>
        <button class="btn save-btn" onclick="saveData()">+ Add New Compound</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Weight</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4akOCR4LTOK6HyvnxwMc7SKpbrMzjNC0",
            authDomain: "compound-workaway.firebaseapp.com",
            databaseURL: "https://compound-workaway-default-rtdb.firebaseio.com",
            projectId: "compound-workaway",
            storageBucket: "compound-workaway.firebasestorage.app",
            messagingSenderId: "1020479561110",
            appId: "1:1020479561110:web:f1cb9448e2bcf9184811b7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const waxRef = database.ref('w');
        let db = {};

        waxRef.on('value', (snapshot) => {
            db = snapshot.val() || {};
            renderList();
        });

        function saveData() {
            const codeInput = document.getElementById('setCode').value.toUpperCase().trim();
            const weight = document.getElementById('setWeight').value.trim();
            
            if (!codeInput || !weight) {
                Swal.fire({
                    title: 'ശ്രദ്ധിക്കുക!',
                    text: 'ദയവായി കോഡും തൂക്കവും നൽകുക!',
                    icon: 'warning',
                    confirmButtonColor: '#5d2d91'
                });
                return;
            }

            const safeKey = codeInput.replace(/\./g, '_');

            if (db[safeKey]) {
                Swal.fire({
                    title: 'വിവരം നിലവിലുണ്ട്',
                    text: 'ഈ കോഡ് നിലവിലുണ്ട്! മാറ്റം വരുത്തണമെങ്കിൽ താഴെയുള്ള ലിസ്റ്റിൽ Edit ചെയ്യുക.',
                    icon: 'info',
                    confirmButtonColor: '#5d2d91'
                });
                return;
            }

            database.ref('w/' + safeKey).set(weight).then(() => {
                document.getElementById('setCode').value = '';
                document.getElementById('setWeight').value = '';
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'സേവ് ചെയ്തു!',
                    showConfirmButton: false,
                    timer: 2000
                });
            });
        }

        function updateItem(code, inputId) {
            const newWeight = document.getElementById(inputId).value.trim();
            if (newWeight && !isNaN(newWeight)) {
                const safeKey = code.replace(/\./g, '_');
                database.ref('w/' + safeKey).set(newWeight).then(() => {
                    Swal.fire({
                        title: 'അപ്ഡേറ്റ് ചെയ്തു!',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                });
            } else {
                Swal.fire({
                    title: 'തെറ്റായ വിവരം',
                    text: 'ദയവായി ശരിയായ തൂക്കം നൽകുക!',
                    icon: 'error'
                });
            }
        }

        function deleteItem(code) {
            Swal.fire({
                title: 'ഡിലീറ്റ് ചെയ്യണോ?',
                text: code + " ഒഴിവാക്കാൻ ആഗ്രഹിക്കുന്നുണ്ടോ?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#5d2d91',
                cancelButtonColor: '#f58220',
                confirmButtonText: 'അതെ',
                cancelButtonText: 'വേണ്ട'
            }).then((result) => {
                if (result.isConfirmed) {
                    database.ref('w/' + code.replace(/\./g, '_')).remove();
                    Swal.fire('ഒഴിവാക്കി!', code + ' ഡിലീറ്റ് ചെയ്തു.', 'success');
                }
            });
        }

        function renderList() {
            const body = document.getElementById('listBody');
            body.innerHTML = '';
            const sortedKeys = Object.keys(db).sort();

            sortedKeys.forEach((key, index) => {
                const displayCode = key.replace(/_/g, '.');
                const weightValue = db[key];
                const inputId = `input-${index}`;

                body.innerHTML += `
                    <tr>
                        <td style="width: 40%; color: #5d2d91;">${displayCode}</td>
                        <td style="width: 30%;">
                            <input type="text" id="${inputId}" value="${weightValue}" class="edit-input">
                        </td>
                        <td class="action-btns">
                            <button class="edit-btn" onclick="updateItem('${displayCode}', '${inputId}')" title="Update">💾</button>
                            <button class="del-btn" onclick="deleteItem('${displayCode}')" title="Delete">×</button>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
